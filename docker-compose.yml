version: '3.8'
services:
  db:
    image: postgres:15
    container_name: ondedoar_db_dev
    restart: always
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: ondedoar_dev
    ports:
      - '5432:5432'
    volumes:
      - ondedoar_pgdata:/var/lib/postgresql/data

volumes:
  ondedoar_pgdata:
